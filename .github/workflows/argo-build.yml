---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Argo / Build

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
    - main
    paths:
    - "gitops/argocd/**"
    - ".github/actions/tools/**"
    # push:
    #   branches:
    #     - main
    #   paths:
    #     - 'gitops/argocd/clusters/**'
    #     - 'gitops/argocdcd/kubernetes/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s_version: [v1.18.2-k3s1]
    steps:
    - name: Monitor Actions
      uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
      with:
        config: ${{ vars.PERMISSIONS_CONFIG }}
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup tools
      uses: ./.github/actions/tools

    - name: Argo-CD validate
      run: |
        ./hack/scripts/gitops-validate.sh argocd gitops/argocd
