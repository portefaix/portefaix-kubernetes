---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Project / Issues and PR labels comments

on: # yamllint disable-line rule:truthy
  issues:
    types: [labeled, unlabeled]
  pull_request_target:
    types: [labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-22.04
    steps:
    - name: Monitor Actions
      uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
      with:
        config: ${{ vars.PERMISSIONS_CONFIG }}

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Label Commenter
      uses: peaceiris/actions-label-commenter@f0dbbef043eb1b150b566db36b0bdc8b7f505579 # v1.10.0
