---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Prow / Github Actions

on: # yamllint disable-line rule:truthy
  issue_comment:
    types: [created]

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
    - name: Monitor Actions
      uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
      with:
        config: ${{ vars.PERMISSIONS_CONFIG }}
    - uses: jpmcb/prow-github-actions@c44ac3a57d67639e39e4a4988b52049ef45b80dd # v2.0.0
      with:
        prow-commands: "/assign /unassign /approve /retitle /area /kind /priority /status /remove /lgtm /close /reopen /lock
          /milestone /hold /cc /uncc"
        github-token: "${{ secrets.GITHUB_TOKEN }}"
