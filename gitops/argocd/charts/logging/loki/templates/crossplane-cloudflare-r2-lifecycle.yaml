{{ if .Values.crossplaneCloudflare.enabled -}}
{{- $accountId := .Values.crossplaneCloudflare.accountId -}}
{{- $retention := mul .Values.crossplaneCloudflare.retention 86400 -}}
{{- range $bucket := (list "admin" "chunks" "ruler") }}
---
apiVersion: r2.cloudflare.crossplane.io/v1alpha1
kind: R2BucketLifecycle
metadata:
  labels:
    {{- include "loki.labels" (index $.Subcharts "loki") | nindent 4 }}
    app.kubernetes.io/component: bucket
    portefaix.xyz/krm: crossplane
    portefaix.xyz/version: v1.3.0
  name: {{ $.Release.Name }}-loki-{{ $bucket }}-lifecycle
  namespace: {{ $.Release.Namespace }}
spec:
  forProvider:
    accountId: {{ $accountId | quote }}
    bucketName: {{ $.Values.crossplaneCloudflare.bucketName }}-loki-{{ $bucket }}
    rules:
      - id: "expire-loki-{{ $bucket }}"
        enabled: true
        deleteObjectsTransition:
          condition:
            maxAge: {{ $retention }}
            type: "Age"
  providerConfigRef:
    name: default
{{- end }}
{{- end }}
