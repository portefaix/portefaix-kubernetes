---
ingress:
  enabled: false
  entries:
  - name: loki-gateway-external
    host: loki-gateway.home.portefaix.xyz
    # className: nginx
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
      # traefik.ingress.kubernetes.io/router.tls: "true"
    labels: {}
  - name: loki-gateway-cloudflare
    host: loki-gateway.homelab.k3s.portefaix.xyz
    # className: nginx
    className: traefik
    annotations:
      external-dns.alpha.kubernetes.io/hostname: loki-gateway.portefaix.xyz
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      external-dns.alpha.kubernetes.io/target: 21b10baa-4cce-4bb0-b00d-2a951ad5d0c5.cfargotunnel.com
      traefik.ingress.kubernetes.io/router.entrypoints: web
      # traefik.ingress.kubernetes.io/router.tls: "true"
      # nginx.ingress.kubernetes.io/auth-url: |-
      #   http://authentik.identity.svc.cluster.local/outpost.goauthentik.io/auth/nginx
      # nginx.ingress.kubernetes.io/auth-signin: |-
      #   http://authentik.homelab.k3s.portefaix.xyz/outpost.goauthentik.io/start?rd=$escaped_request_uri
      # nginx.ingress.kubernetes.io/auth-response-headers: |-
      #   Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
      # nginx.ingress.kubernetes.io/auth-snippet: |
      #   proxy_set_header X-Forwarded-Host $http_host;
    labels:
      external-dns.io/provider: cloudflare

alerting:
  dashboard_url: "http://grafana.home.portefaix.xyz/d/L_arsiBVk/logging-applications-overview?orgId=1"
  runbook_url: "http://grafana.home.portefaix.xyz"

loki:
  clusterLabelOverride: portefaix-talos-homelab

  loki:
    storage:
      bucketNames:
        admin: portefaix-homelab-logs-admin
        chunks: portefaix-homelab-logs-chunks
        ruler: portefaix-homelab-logs-ruler
      type: s3
      s3:
        s3: null
        endpoint: ${AWS_S3_ENDPOINT}
        region: auto
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
        s3ForcePathStyle: true
        insecure: false
        http_config: {}

  gateway:
    enabled: true
    replicas: 1
    verboseLogging: true
    resources:
      limits:
        memory: 600Mi
      requests:
        cpu: 15m
        memory: 50Mi
    ingress:
      enabled: true
      # ingressClassName: nginx
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
        # traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
      - host: loki-gateway.192.168.0.61.nip.io
        paths:
        - path: /
          pathType: Prefix
      tls: []

  ingester:
    enabled: true
    replicas: 2
    extraEnvFrom:
    - secretRef:
        name: loki-cloudflare-credentials
    resources:
      limits:
        memory: 600Mi
      requests:
        cpu: 60m
        memory: 200Mi
    persistence:
      enabled: true
      claims:
        - name: data
          size: 300Mi
          storageClass: local-path
    # nodeSelector:
    #   node-role.kubernetes.io/infra: "true"

  distributor:
    enabled: true
    replicas: 3
    maxUnavailable: 1
    podDisruptionBudget:
      maxUnavailable: 1
    extraEnvFrom:
    - secretRef:
        name: loki-cloudflare-credentials
    resources:
      limits:
        memory: 600Mi
      requests:
        cpu: 60m
        memory: 200Mi

  querier:
    enabled: true
    replicas: 1
    extraEnvFrom:
    - secretRef:
        name: loki-cloudflare-credentials
    resources:
      limits:
        memory: 600Mi
      requests:
        cpu: 60m
        memory: 200Mi
    persistence:
      enabled: true
      claims:
        - name: data
          size: 300Mi
          storageClass: local-path

  compactor:
    enabled: true
    replicas: 1
    maxUnavailable: 1
    podDisruptionBudget:
      maxUnavailable: 1
    extraEnvFrom:
    - secretRef:
        name: loki-cloudflare-credentials
    resources:
      limits:
        memory: 600Mi
      requests:
        cpu: 60m
        memory: 200Mi
    persistence:
      enabled: true
      claims:
        - name: data
          size: 300Mi
          storageClass: local-path

  query_range:
    align_queries_with_step: true
    parallelise_shardable_queries: false
    max_retries: 3
    cache_results: true
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 100

  sidecar:
    resources:
      limits:
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 20Mi

  memcachedExporter:
    resources:
      limits:
        memory: 100Mi
      requests:
        cpu: 5m
        memory: 30Mi

  resultsCache:
    allocatedMemory: 1024
    writebackSizeLimit: 200MB
    resources:
      limits:
        memory: 400Mi
      resources:
        cpu: 5m
        memory: 100Mi

  chunksCache:
    allocatedMemory: 300
    writebackSizeLimit: 200MB
    resources:
      limits:
        memory: 400Mi
      resources:
        cpu: 5m
        memory: 100Mi
